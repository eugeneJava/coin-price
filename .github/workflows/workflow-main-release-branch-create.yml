name: Create release branch
run-name: Create release branch
on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  create-release-branch:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version format
        run: |
          CURRENT_RELEASE="${{ vars.CURRENT_RELEASE }}"

          echo "Version: $CURRENT_RELEASE"

          if [[ ! "$CURRENT_RELEASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Use x.y.z (e.g. 1.0.2)"
            exit 1
          fi

      - name: Create release branch
        run: |
          CURRENT_RELEASE="${{ vars.CURRENT_RELEASE }}"
          BRANCH="release/$CURRENT_RELEASE"

          echo "Creating branch: $BRANCH"

          git checkout -b "$BRANCH"
          git push origin "$BRANCH"